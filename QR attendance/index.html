<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Attendance System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container landing-container">
    <div class="header-text">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-qr-code"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>
      </div>
      <h1>QR Attendance System</h1>
      <p>Secure, location-aware, and fast student attendance tracking. Designed to prevent proxy attendance using dynamic QR codes.</p>
    </div>

    <div class="card auth-card">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" required placeholder="••••••••">
        </div>
        <div id="loginError" class="error-text"></div>
        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" required placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="regRole">
            <option value="STUDENT">Student</option>
            <option value="TEACHER">Teacher</option>
          </select>
        </div>
        <div id="regError" class="error-text"></div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Specific logic for index.html (Auth)
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
      
      if(tab === 'login') {
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
    }

    // Redirect if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      const user = AppDB.getCurrentUser();
      if(user) {
        window.location.href = user.role === 'TEACHER' ? 'teacher.html' : 'student.html';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const role = document.getElementById('regRole').value;

      try {
        Auth.register(name, email, password, role);
        document.getElementById('regError').style.color = 'green';
        document.getElementById('regError').innerText = 'Registration successful! Please login.';
        setTimeout(() => switchTab('login'), 1500);
      } catch (err) {
        document.getElementById('regError').style.color = 'red';
        document.getElementById('regError').innerText = err.message;
      }
    });

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const user = Auth.login(email, password);
        window.location.href = user.role === 'TEACHER' ? 'teacher.html' : 'student.html';
      } catch (err) {
        document.getElementById('loginError').style.color = 'red';
        document.getElementById('loginError').innerText = err.message;
      }
    });
  </script>
</body>
</html>
